name: WakaTime Image

on:
  schedule:
    # Hẹn giờ chạy vào 0h30 (chạy sau bot kia 30 phút để không bị đụng nhau)
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate WakaTime Image
        uses: lowlighter/metrics@latest
        with:
          filename: assets/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
