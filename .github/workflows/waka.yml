name: Update Profile (WakaTime & Snake)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *" 
jobs:
  # 🐍 JOB 1: TẠO VÀ LƯU CON RẮN TRƯỚC
  update-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Snake to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🐍 Generate Contribution Snake"
          branch: main

  # ⏱️ JOB 2: ĐỢI RẮN XONG RỒI MỚI CẬP NHẬT WAKATIME
  update-wakatime:
    needs: update-snake # Cú pháp này bắt buộc Job 2 đợi Job 1 xong mới chạy, tránh đụng chạm file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LOC_CHART: "True"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "📊 Updated WakaTime Stats"
          SECTION_NAME: "waka"
          COMMIT_BY_ME: "True" # <--- Tui đã thêm dòng này vào đây cho bạn nè!
