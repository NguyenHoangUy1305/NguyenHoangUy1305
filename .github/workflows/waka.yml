name: Update Profile (WakaTime & Snake)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
  update-everything:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets

      # 1. Tạo con Rắn và đưa vào thư mục assets
      - name: Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Bắt buộc Git nhận diện file Rắn mới tạo
      - name: Stage Snake files
        run: |
          git add assets/github-contribution-grid-snake.svg
          git add assets/github-contribution-grid-snake-dark.svg

      # 3. Chạy WakaTime và gom tất cả vào 1 commit duy nhất
      - name: Update WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LOC_CHART: "True"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "📊 Updated WakaTime Stats"
          SECTION_NAME: "waka"
          COMMIT_BY_ME: "True"
